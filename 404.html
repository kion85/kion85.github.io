<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .cube-container {
            perspective: 1000px;
        }
        
        .cube {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 8s infinite linear;
        }
        
        @keyframes rotate {
            from { transform: rotateX(-20deg) rotateY(0deg); }
            to { transform: rotateX(-20deg) rotateY(360deg); }
        }
        
        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #238636 0%, #2ea043 50%, #238636 100%);
            border: 3px solid #3fb950;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(63, 185, 80, 0.5);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        
        .face.front  { transform: translateZ(100px); }
        .face.back   { transform: rotateY(180deg) translateZ(100px); }
        .face.right  { transform: rotateY(90deg) translateZ(100px); }
        .face.left   { transform: rotateY(-90deg) translateZ(100px); }
        .face.top    { transform: rotateX(90deg) translateZ(100px); }
        .face.bottom { transform: rotateX(-90deg) translateZ(100px); }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .git-branch {
            position: absolute;
            animation: branch 4s ease-in-out infinite;
        }
        
        @keyframes branch {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(2deg); }
            75% { transform: translateY(10px) rotate(-2deg); }
        }
        
        .octocat {
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        
        .glow-green {
            box-shadow: 0 0 30px rgba(63, 185, 80, 0.4), 0 0 60px rgba(63, 185, 80, 0.2);
        }
        
        .link-card {
            transition: all 0.3s ease;
        }
        
        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .github-icon:hover {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        
        .gitlab-icon:hover {
            filter: drop-shadow(0 0 10px rgba(252, 109, 38, 0.5));
        }
        
        .terminal-line {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #3fb950;
            animation: typing 3s steps(30) infinite, blink 0.5s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">
    <!-- Stars Background -->
    <div class="stars" id="stars"></div>
    
    <!-- Git Branch Decorations -->
    <svg class="git-branch absolute top-20 left-10 w-32 h-32 text-green-500/20" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="6" cy="6" r="3"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="12" r="3"/>
        <path d="M6 9v6c0 1.1.9 2 2 2h10" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
    
    <svg class="git-branch absolute bottom-20 right-10 w-24 h-24 text-green-500/20" viewBox="0 0 24 24" fill="currentColor" style="animation-delay: -2s;">
        <circle cx="6" cy="6" r="3"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="12" r="3"/>
        <path d="M6 9v6c0 1.1.9 2 2 2h10" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
    
    <!-- Main Content -->
    <div class="text-center z-10 px-4">
        <!-- 3D Cube -->
        <div class="cube-container mb-8">
            <div class="cube">
                <div class="face front">4</div>
                <div class="face back">4</div>
                <div class="face right">0</div>
                <div class="face left">0</div>
                <div class="face top">4</div>
                <div class="face bottom">0</div>
            </div>
        </div>
        
        <!-- Octocat -->
        <div class="octocat mb-6">
            <svg class="w-24 h-24 mx-auto" viewBox="0 0 24 24" fill="none">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" fill="#238636"/>
            </svg>
        </div>
        
        <!-- Title -->
        <h1 class="mono text-6xl md:text-8xl font-bold text-white mb-4 floating glow-green rounded-lg px-6 py-2 inline-block bg-black/30">
            404
        </h1>
        
        <!-- Subtitle -->
        <p class="text-xl md:text-2xl text-gray-400 mb-2">
            Repository not found
        </p>
        
        <!-- Terminal style message -->
        <div class="mono bg-black/50 rounded-lg p-4 max-w-md mx-auto mb-8 text-left">
            <div class="text-green-400 text-sm">
                <span class="text-blue-400">$</span> git clone page
                <br>
                <span class="text-red-400">error:</span> The page you're looking for doesn't exist
                <br>
                <span class="text-yellow-400">hint:</span> Check the URL or go home
            </div>
        </div>
        
        <!-- Links -->
        <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
            <!-- GitHub Link -->
            <a href="https://github.com/kion85" target="_blank" rel="noopener noreferrer" 
               class="link-card flex items-center gap-3 bg-gray-800/80 hover:bg-gray-700/80 border border-gray-600 rounded-xl px-6 py-4 transition-all">
                <svg class="w-8 h-8 github-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <div class="text-left">
                    <div class="text-xs text-gray-400">GitHub</div>
                    <div class="text-white font-semibold">@kion85</div>
                </div>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
            </a>
            
            <!-- GitLab Link -->
            <a href="https://gitlab.com/kion85" target="_blank" rel="noopener noreferrer"
               class="link-card flex items-center gap-3 bg-gray-800/80 hover:bg-gray-700/80 border border-gray-600 rounded-xl px-6 py-4 transition-all">
                <svg class="w-8 h-8 gitlab-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 0 1 4.82 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.49h8.1l2.44-7.51A.42.42 0 0 1 18.6 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.51L23 13.45a.84.84 0 0 1-.35.94z"/>
                </svg>
                <div class="text-left">
                    <div class="text-xs text-gray-400">GitLab</div>
                    <div class="text-white font-semibold">@kion85</div>
                </div>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
            </a>
        </div>
        
        <!-- Back button -->
        <div class="mt-8">
            <a href="/" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go back home
            </a>
        </div>
    </div>
    
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        const starCount = 100;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            starsContainer.appendChild(star);
        }
        
        // Add floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'absolute w-2 h-2 bg-green-500/30 rounded-full';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-10px';
            particle.style.animation = `float ${Math.random() * 3 + 2}s linear forwards`;
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 5000);
        }
        
        setInterval(createParticle, 500);
    </script>
</body>
</html>
