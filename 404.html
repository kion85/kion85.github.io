<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена | kion85</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 25%, #0d1117 50%, #1c2128 75%, #0d1117 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(88, 166, 255, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 3D Cube */
        .cube-container {
            perspective: 1000px;
            margin: 40px auto;
        }

        .cube {
            width: 150px;
            height: 150px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 20s infinite linear;
        }

        @keyframes rotateCube {
            0% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
            100% {
                transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
            }
        }

        .cube-face {
            position: absolute;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid rgba(88, 166, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .cube-face i {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .cube-face span {
            display: block;
            font-size: 14px;
            margin-top: 5px;
        }

        .face-front {
            background: rgba(13, 17, 23, 0.9);
            transform: translateZ(75px);
        }

        .face-back {
            background: rgba(13, 17, 23, 0.9);
            transform: rotateY(180deg) translateZ(75px);
        }

        .face-right {
            background: rgba(13, 17, 23, 0.9);
            transform: rotateY(90deg) translateZ(75px);
        }

        .face-left {
            background: rgba(13, 17, 23, 0.9);
            transform: rotateY(-90deg) translateZ(75px);
        }

        .face-top {
            background: rgba(13, 17, 23, 0.9);
            transform: rotateX(90deg) translateZ(75px);
        }

        .face-bottom {
            background: rgba(13, 17, 23, 0.9);
            transform: rotateX(-90deg) translateZ(75px);
        }

        /* 404 Text */
        .error-code {
            font-size: 180px;
            font-weight: 900;
            background: linear-gradient(135deg, #58a6ff 0%, #8b949e 50%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(88, 166, 255, 0.5);
            animation: pulse 3s ease-in-out infinite;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.05);
                filter: brightness(1.2);
            }
        }

        /* Stats Cards */
        .stats-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 16px;
            padding: 25px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(88, 166, 255, 0.8);
            box-shadow: 0 10px 40px rgba(88, 166, 255, 0.2);
        }

        .stat-card.github:hover {
            box-shadow: 0 10px 40px rgba(88, 166, 255, 0.3);
        }

        .stat-card.gitlab:hover {
            box-shadow: 0 10px 40px rgba(252, 109, 38, 0.3);
        }

        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stat-card.github .stat-icon {
            color: #f0f6fc;
        }

        .stat-card.gitlab .stat-icon {
            color: #fc6d26;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 700;
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #8b949e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .message {
            color: #8b949e;
            font-size: 24px;
            margin: 20px 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .sub-message {
            color: #6e7681;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2ea043 0%, #3fb950 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(46, 160, 67, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #58a6ff;
            border-color: #58a6ff;
        }

        .btn-secondary:hover {
            background: rgba(88, 166, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            color: #ffffff;
        }

        .btn-discord:hover {
            background: linear-gradient(135deg, #4752C4 0%, #3c45a8 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
        }

        /* Loading animation */
        .loading {
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Floating elements */
        .floating {
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Glitch effect */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-1 0.3s infinite linear alternate-reverse;
            color: #ff00c1;
            z-index: -1;
        }

        .glitch::after {
            animation: glitch-2 0.3s infinite linear alternate-reverse;
            color: #00fff9;
            z-index: -2;
        }

        @keyframes glitch-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(30% 0 20% 0); transform: translate(2px, 1px); }
            60% { clip-path: inset(15% 0 80% 0); transform: translate(-1px, -2px); }
            80% { clip-path: inset(55% 0 10% 0); transform: translate(1px, 2px); }
            100% { clip-path: inset(40% 0 30% 0); transform: translate(-2px, 1px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 120px;
            }
            
            .cube {
                width: 100px;
                height: 100px;
            }
            
            .cube-face {
                width: 100px;
                height: 100px;
                font-size: 18px;
            }
            
            .cube-face i {
                font-size: 35px;
            }
            
            .face-front, .face-back, .face-right, .face-left, .face-top, .face-bottom {
                transform: translateZ(50px);
            }
            
            .face-back { transform: rotateY(180deg) translateZ(50px); }
            .face-right { transform: rotateY(90deg) translateZ(50px); }
            .face-left { transform: rotateY(-90deg) translateZ(50px); }
            .face-top { transform: rotateX(90deg) translateZ(50px); }
            .face-bottom { transform: rotateX(-90deg) translateZ(50px); }
            
            .stat-card {
                padding: 20px 30px;
            }
            
            .stat-number {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="content">
        <!-- 3D Cube -->
        <div class="cube-container floating">
            <div class="cube">
                <div class="cube-face face-front">
                    <div>
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </div>
                </div>
                <div class="cube-face face-back">
                    <div>
                        <i class="fab fa-gitlab"></i>
                        <span>GitLab</span>
                    </div>
                </div>
                <div class="cube-face face-right">
                    <div>
                        <i class="fab fa-linux"></i>
                        <span>Linux</span>
                    </div>
                </div>
                <div class="cube-face face-left">
                    <div>
                        <i class="fas fa-code"></i>
                        <span>Code</span>
                    </div>
                </div>
                <div class="cube-face face-top">
                    <div>
                        <i class="fas fa-terminal"></i>
                        <span>Bash</span>
                    </div>
                </div>
                <div class="cube-face face-bottom">
                    <div>
                        <i class="fas fa-server"></i>
                        <span>DevOps</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 404 Error Code -->
        <h1 class="error-code glitch" data-text="404">404</h1>

        <!-- Stats Cards -->
        <div class="stats-container">
            <a href="https://github.com/kion85" target="_blank" class="stat-card github">
                <i class="fab fa-github stat-icon"></i>
                <div class="stat-number loading" id="github-repos">--</div>
                <div class="stat-label">GitHub Repositories</div>
            </a>
            <a href="https://gitlab.com/kion85" target="_blank" class="stat-card gitlab">
                <i class="fab fa-gitlab stat-icon"></i>
                <div class="stat-number loading" id="gitlab-repos">--</div>
                <div class="stat-label">GitLab Projects</div>
            </a>
        </div>

        <!-- Message -->
        <p class="message">Упс! Здесь ничего нет...</p>
        <p class="sub-message">
            Страница, которую вы ищете, не существует или была перемещена. 
            Но вы всегда можете проверить мои репозитории!
        </p>

        <!-- Buttons -->
        <div class="btn-container">
            <a href="https://github.com/kion85" target="_blank" class="btn btn-primary">
                <i class="fab fa-github"></i>
                GitHub Profile
            </a>
            <a href="https://gitlab.com/kion85" target="_blank" class="btn btn-secondary">
                <i class="fab fa-gitlab"></i>
                GitLab Profile
            </a>
            <a href="https://discord.com/users/1476465632190140427" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i>
                Discord
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                На главную
            </a>
        </div>
    </div>

    <script>
        // Create background particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Fetch GitHub stats
        async function fetchGitHubStats() {
            try {
                const response = await fetch('https://api.github.com/users/kion85');
                const data = await response.json();
                
                if (data.public_repos !== undefined) {
                    document.getElementById('github-repos').textContent = data.public_repos;
                    document.getElementById('github-repos').classList.remove('loading');
                }
            } catch (error) {
                console.error('Error fetching GitHub stats:', error);
                document.getElementById('github-repos').textContent = 'N/A';
                document.getElementById('github-repos').classList.remove('loading');
            }
        }

        // Fetch GitLab stats
        async function fetchGitLabStats() {
            try {
                const response = await fetch('https://gitlab.com/api/v4/users?username=kion85');
                const users = await response.json();
                
                if (users && users.length > 0) {
                    const userId = users[0].id;
                    const projectsResponse = await fetch(`https://gitlab.com/api/v4/users/${userId}/projects`);
                    const projects = await projectsResponse.json();
                    
                    document.getElementById('gitlab-repos').textContent = projects.length;
                    document.getElementById('gitlab-repos').classList.remove('loading');
                }
            } catch (error) {
                console.error('Error fetching GitLab stats:', error);
                document.getElementById('gitlab-repos').textContent = 'N/A';
                document.getElementById('gitlab-repos').classList.remove('loading');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            fetchGitHubStats();
            fetchGitLabStats();
        });

        // Add tilt effect to stat cards
        document.querySelectorAll('.stat-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
            });
        });
    </script>
</body>
</html>
